<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronicle - 多機能絵日記帳 [Safari対応ハイブリッド版]</title>
    <style>
        :root {
            --panel-bg: #ffffff;          /* 基本のパネル背景 */
            --text-main: #1a252f;         /* より濃くハッキリしたチャコール */
            --text-muted: #555555;        /* 薄すぎない、しっかり読めるグレー */
            --border-color: #b0a99f;      /* 枠線を太く・濃くして境界を明瞭に */
            --danger-color: #c0392b;      /* 落ち着いたワインレッド */

            /* 初期値（Classic Gold） */
            --bg-color: #fcfbf9;
            --accent-color: #a0522d;
            --accent-hover: #8b4513;
        }

        /* --- メリハリがあり区別しやすい10種類のエレガントなテーマ定義 --- */
        body.theme-classic { --bg-color: #fcfbf9; --accent-color: #a0522d; --accent-hover: #8b4513; } /* シエナブラウン */
        body.theme-green   { --bg-color: #f2f7f4; --accent-color: #1e5631; --accent-hover: #143d22; } /* フォレストグリーン */
        body.theme-blue    { --bg-color: #f0f5fa; --accent-color: #1a4a75; --accent-hover: #103250; } /* ディープブルー */
        body.theme-red     { --bg-color: #faf2f2; --accent-color: #8b0000; --accent-hover: #5a0000; } /* ダークレッド */
        body.theme-pink    { --bg-color: #fdf5f7; --accent-color: #b33951; --accent-hover: #8c2639; } /* ローズマゼンタ */
        body.theme-purple  { --bg-color: #f6f3f8; --accent-color: #5d317c; --accent-hover: #43205b; } /* ロイヤルパープル */
        body.theme-amber   { --bg-color: #fcf7f2; --accent-color: #c25c0e; --accent-hover: #964303; } /* ディープアンバー */
        body.theme-teal    { --bg-color: #f0f7f7; --accent-color: #006666; --accent-hover: #004d4d; } /* ディープティール */
        body.theme-gray    { --bg-color: #f5f6f6; --accent-color: #4a5568; --accent-hover: #2d3748; } /* スレートグレー */
        body.theme-dark    { --bg-color: #eef0f1; --accent-color: #2c3e50; --accent-hover: #1a252f; } /* ミッドmidnightブラック */

        body {
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", "Hiragino Kaku Gothic ProN", "BIZ UDPGothic", "Meiryo", sans-serif;
            color: var(--text-main);
            font-weight: 500;
            margin: 0;
            padding: 20px 10px 40px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            letter-spacing: 0.05em;
            transition: background-color 0.4s ease;
        }

        /* ノート切り替えタブ */
        .notebook-tabs-container {
            width: 100%;
            max-width: 1200px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        .notebook-tabs {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 2px;
            background-color: var(--border-color);
            border: 2px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
        }
        .notebook-tab {
            padding: 15px 15px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-muted);
            background-color: var(--panel-bg);
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
            box-sizing: border-box;
            min-width: 0;
        }
        .notebook-tab:hover {
            background-color: #f5f3ef;
            color: var(--text-main);
        }
        .notebook-tab.active {
            background-color: #fff;
            color: var(--text-main);
            font-weight: 800;
            box-shadow: inset 0 -4px 0 var(--accent-color);
        }
        .notebook-tab-add {
            background-color: #f5f3ef;
            color: var(--text-main);
            justify-content: center;
        }
        .notebook-tab-add:hover {
            background-color: #e5e2db;
        }
        .notebook-tab-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex-grow: 1;
            margin-right: 5px;
        }
        .notebook-tab-rename-btn {
            font-size: 0.85rem;
            color: var(--accent-color);
            background: none;
            border: none;
            padding: 2px 4px;
            width: auto;
            cursor: pointer;
            flex-shrink: 0;
        }

        /* 現在の日記帳名とテーマ設定エリア */
        .notebook-header-panel {
            width: 100%;
            max-width: 1200px;
            background-color: var(--panel-bg);
            border: 2px solid var(--border-color);
            border-radius: 6px;
            padding: 15px 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .current-notebook-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-main);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .theme-selector-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-main);
            flex-wrap: wrap;
        }
        .theme-selector-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .theme-selector-wrapper select {
            width: auto;
            padding: 8px 12px;
            font-weight: 600;
            border: 2px solid var(--border-color);
        }

        /* 全体コンテナ */
        .container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 992px) {
            .container {
                grid-template-columns: 290px 1fr 290px;
                align-items: start;
            }
            .sidebar-left, .sidebar-right {
                position: sticky;
                top: 20px;
            }
        }

        .notebook-panel {
            background-color: var(--panel-bg);
            border: 2px solid var(--border-color);
            border-radius: 6px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
        }

        .notebook-panel.history-panel {
            margin-top: 20px;
        }

        h2, h3 {
            margin-top: 0;
            color: var(--text-main);
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: 0.1em;
            border-bottom: 3px solid var(--accent-color);
            padding-bottom: 8px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .editable-label {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--accent-color);
            display: inline-block;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .form-group { margin-bottom: 25px; }

        .form-note {
            display: block;
            font-size: 0.8rem;
            color: var(--danger-color);
            margin-top: 4px;
            font-weight: 600;
        }

        .file-size-badge {
            display: inline-block;
            color: var(--text-muted);
            padding: 2px 0;
            font-size: 0.75rem;
            margin-top: 2px;
            font-weight: 500;
            letter-spacing: 0.02em;
            opacity: 0.85;
        }

        input[type="text"], input[type="date"], select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 4px;
            background-color: #faf9f6;
            box-sizing: border-box;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-main);
            font-family: inherit;
            transition: all 0.3s;
        }
        input[type="text"]:focus, input[type="date"]:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            background-color: #fff;
        }

        textarea { height: 180px; resize: vertical; line-height: 1.8; font-weight: 500; }

        .weather-input-container {
            display: flex;
            gap: 10px;
        }
        .weather-input-container select {
            flex: 1;
        }
        .weather-input-container input[type="text"] {
            flex: 1;
        }

        .image-preview-area {
            border: 2px dashed var(--border-color);
            padding: 20px;
            text-align: center;
            background-color: #faf9f6;
            cursor: pointer;
            font-weight: 600;
            transition: border-color 0.2s;
            margin-bottom: 15px;
            color: var(--text-muted);
        }
        .image-preview-area:hover {
            border-color: var(--accent-color);
            color: var(--text-main);
        }
        
        .form-images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .form-image-item {
            display: flex;
            flex-direction: column;
            background-color: #faf9f6;
            border: 2px solid var(--border-color);
            border-radius: 4px;
            padding: 8px;
            box-sizing: border-box;
            position: relative;
        }
        .form-image-item img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 2px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .diary-view-gallery {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }
        .diary-view-image-wrapper {
            background-color: #faf9f6;
            padding: 15px;
            border: 2px solid var(--border-color);
            text-align: center;
        }
        .diary-view-image-wrapper img {
            max-width: 100%;
            max-height: 400px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 12px 20px;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
            text-transform: uppercase;
        }
        button:hover { background-color: var(--accent-hover); }

        .backup-btn {
            background-color: transparent;
            color: var(--text-main);
            border: 2px solid var(--border-color);
            margin-bottom: 12px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .backup-btn:hover { background-color: #faf9f6; }
        
        .new-post-btn { background-color: var(--text-main); margin-bottom: 25px; font-size: 1rem;}
        .new-post-btn:hover { background-color: #000000; }
        
        .file-input-label {
            display: block;
            background-color: transparent;
            color: var(--text-main);
            border: 2px solid var(--border-color);
            border-radius: 4px;
            padding: 10px 15px;
            font-size: 0.85rem;
            text-align: center;
            cursor: pointer;
        }
        .file-input-label:hover { background-color: #faf9f6; }

        .index-list, .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .index-list { max-height: 450px; overflow-y: auto; }

        .index-item, .history-item {
            padding: 12px 14px;
            background-color: #faf9f6;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 4px;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }
        .index-item:hover, .index-item.active, .history-item:hover {
            background-color: #ffffff;
            border-color: var(--accent-color);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            transform: translateY(-1px);
        }
        .index-item.active {
            border-left: 6px solid var(--accent-color);
        }
        .index-row-top, .history-row-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
        }
        .index-page-num, .history-notebook-name {
            color: var(--accent-color);
        }
        .index-row-bottom, .history-row-bottom {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-top: 2px;
        }
        .index-row-bottom.empty-title, .history-row-bottom.empty-title {
            color: #b0a99f;
            font-size: 0.85rem;
            font-style: italic;
        }

        .diary-view-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-main);
            margin: -5px 0 15px 0;
            padding-bottom: 2px;
        }

        .diary-view-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-main);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
        }
        .diary-view-text {
            font-size: 1.05rem;
            font-weight: 500;
            line-height: 2;
            white-space: pre-wrap;
            color: var(--text-main);
            min-height: 150px;
        }
        
        .diary-view-text.vertical {
            writing-mode: vertical-rl;
            -webkit-writing-mode: vertical-rl;
            letter-spacing: 0.1em;
            line-height: 2.2;
            height: 400px;
            max-height: 70vh;
            overflow-x: auto;
            overflow-y: hidden;
            width: 100%;
            padding: 10px 0;
            font-family: "Georgia", "Hiragino Mincho ProN", "BIZ UDMincho", serif;
            box-sizing: border-box;
            border-right: 1px dashed var(--border-color);
        }
        
        .action-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 40px;
            border-top: 2px solid var(--border-color);
            padding-top: 20px;
        }
        .delete-btn { background-color: transparent; color: var(--text-muted); border: 2px solid var(--border-color); padding: 8px 16px; font-size: 0.85rem; font-weight: 600; width: auto; }
        .delete-btn:hover { background-color: #fff1f0; color: var(--danger-color); border-color: var(--danger-color); }
        .edit-entry-btn { background-color: transparent; color: var(--accent-color); border: 2px solid var(--accent-color); padding: 8px 16px; font-size: 0.85rem; font-weight: 700; width: auto; }
        .edit-entry-btn:hover { background-color: var(--accent-color); color: white; }

        /* カレンダー */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .calendar-title {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .calendar-era {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 2px;
        }
        .calendar-western {
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 0.05em;
        }
        .calendar-nav-btn {
            background: none;
            color: var(--text-main);
            border: 2px solid var(--border-color);
            border-radius: 4px;
            padding: 4px 12px;
            width: auto;
            font-size: 0.85rem;
            font-weight: 700;
        }
        .calendar-nav-btn:hover { background-color: #faf9f6; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
        .calendar-day-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-main);
            padding-bottom: 8px;
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 4px;
        }
        .calendar-cell {
            font-size: 0.85rem;
            font-weight: 600;
            padding: 8px 0;
            color: #b0b0b0;
        }
        .calendar-cell.current-month {
            color: var(--text-main);
            cursor: pointer;
            border: 2px solid transparent;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .calendar-cell.current-month:hover {
            background-color: #eae6db;
        }
        .calendar-cell.has-diary {
            background-color: #ffffff;
            color: var(--accent-color);
            font-weight: 800;
            border: 2px solid var(--accent-color);
        }
        .calendar-cell.has-diary:hover {
            background-color: var(--accent-color);
            color: white;
        }
        .calendar-cell.is-active {
            background-color: var(--text-main) !important;
            color: white !important;
            border-color: var(--text-main) !important;
        }

        .calendar-footer {
            margin-top: 15px;
            display: flex;
            justify-content: center;
        }
        .calendar-today-btn {
            background-color: transparent;
            color: var(--text-main);
            border: 2px solid var(--border-color);
            border-radius: 4px;
            padding: 6px 20px;
            font-size: 0.85rem;
            font-weight: 700;
            width: auto;
            transition: all 0.2s;
        }
        .calendar-today-btn:hover {
            background-color: var(--text-main);
            color: #ffffff;
            border-color: var(--text-main);
        }
    </style>
</head>
<body class="theme-classic" id="appBody">

<div class="notebook-tabs-container">
    <div class="notebook-tabs" id="notebookTabs"></div>
</div>

<div class="notebook-header-panel">
    <h1 class="current-notebook-title" id="currentNotebookTitle">📖 DIARY</h1>
    <div class="theme-selector-wrapper">
        <div class="theme-selector-item">
            <span id="lblColorTheme">COLOR THEME</span>
            <select id="notebookGlobalTheme" onchange="changeNotebookTheme(this.value)">
                <option value="theme-classic">1. Sienna Brown</option>
                <option value="theme-green">2. Forest Green</option>
                <option value="theme-blue">3. Deep Blue</option>
                <option value="theme-red">4. Dark Red</option>
                <option value="theme-pink">5. Rose Magenta</option>
                <option value="theme-purple">6. Royal Purple</option>
                <option value="theme-amber">7. Deep Amber</option>
                <option value="theme-teal">8. Deep Teal</option>
                <option value="theme-gray">9. Slate Gray</option>
                <option value="theme-dark">10. Midnight Black</option>
            </select>
        </div>
        <div class="theme-selector-item">
            <span id="lblWritingDirection">WRITING DIRECTION</span>
            <select id="notebookWritingMode" onchange="changeNotebookWritingMode(this.value === 'true')">
                <option value="false">横書き Horizontal</option>
                <option value="true">縦書き Vertical</option>
            </select>
        </div>
    </div>
</div>

<div class="container">
    <div class="sidebar-left">
        <div class="notebook-panel">
            <button class="new-post-btn" id="newPostBtn" onclick="showNewForm()">Write a Diary</button>
            <h3 id="indexHeader" style="margin-top: 20px;">Index</h3>
            <ul class="index-list" id="indexList" style="margin-bottom: 30px;"></ul>
            <h3 id="mgmtHeader" style="margin-top: 0;">Management</h3>
            <div>
                <button class="backup-btn" id="exportBtn" onclick="exportData()">export (backup)</button>
                <label class="file-input-label" id="importLabel">
                    <span id="importBtnText">import (restore)</span>
                    <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importData(this)">
                </label>
            </div>
        </div>
    </div>

    <div class="notebook-panel" id="mainPanel">
        <div style="text-align:center; padding:50px; font-weight:600; color:var(--text-muted);">システム準備中...</div>
    </div>

    <div class="sidebar-right">
        <div class="notebook-panel">
            <h3 id="calendarHeader" style="margin-top: 0;">Calendar</h3>
            <div class="calendar-header">
                <button class="calendar-nav-btn" onclick="moveCalendar(-1)">◀</button>
                <div class="calendar-title" id="calendarTitle">
                    <span class="calendar-era" id="calendarEra"></span>
                    <span class="calendar-western" id="calendarWestern">2026.07</span>
                </div>
                <button class="calendar-nav-btn" onclick="moveCalendar(1)">▶</button>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
            <div class="calendar-footer">
                <button class="calendar-today-btn" id="todayBtn" onclick="jumpToToday()">今日</button>
            </div>
        </div>

        <div class="notebook-panel history-panel">
            <h3 id="activityHeader" style="margin-top: 0;">Recent Activity</h3>
            <ul class="history-list" id="historyList"></ul>
        </div>
    </div>
</div>

<script>
    // --- IndexedDB & localStorage ハイブリッド管理システム ---
    const DB_NAME = "ChronicleAppDB";
    const DB_VERSION = 1;
    let db = null;
    let isIndexedDBAvailable = false;

    function initDB() {
        return new Promise((resolve) => {
            try {
                // Safariのローカル実行制限チェックを兼ねる
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = function(e) {
                    const database = e.target.result;
                    if (!database.objectStoreNames.contains("app_state")) {
                        database.createObjectStore("app_state");
                    }
                };
                request.onsuccess = function(e) {
                    db = e.target.result;
                    isIndexedDBAvailable = true;
                    console.log("Database: IndexedDB モードで起動しました。");
                    resolve();
                };
                request.onerror = function() {
                    console.warn("Database: IndexedDB の起動がブロックされました。localStorage モードへ切り替えます。");
                    isIndexedDBAvailable = false;
                    resolve();
                };
            } catch (e) {
                console.warn("Database: IndexedDB 例外エラーのため localStorage モードで起動します。");
                isIndexedDBAvailable = false;
                resolve();
            }
        });
    }

    function getDBValue(key, defaultValue) {
        if (!isIndexedDBAvailable) {
            const val = localStorage.getItem('chronicle_v3_' + key);
            return Promise.resolve(val !== null ? JSON.parse(val) : defaultValue);
        }
        return new Promise((resolve) => {
            const transaction = db.transaction(["app_state"], "readonly");
            const store = transaction.objectStore("app_state");
            const request = store.get(key);
            request.onsuccess = function() {
                resolve(request.result !== undefined ? request.result : defaultValue);
            };
            request.onerror = function() {
                resolve(defaultValue);
            };
        });
    }

    function setDBValue(key, value) {
        if (!isIndexedDBAvailable) {
            localStorage.setItem('chronicle_v3_' + key, JSON.stringify(value));
            return Promise.resolve();
        }
        return new Promise((resolve, reject) => {
            const transaction = db.transaction(["app_state"], "readwrite");
            const store = transaction.objectStore("app_state");
            const request = store.put(value, key);
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    }

    function clearDB() {
        if (!isIndexedDBAvailable) {
            // 前のバージョンや別キーに影響が出ないよう、接頭辞付きデータのみ削除
            localStorage.removeItem('chronicle_v3_notebooks');
            localStorage.removeItem('chronicle_v3_current_nb_id');
            localStorage.removeItem('chronicle_v3_edit_history');
            return Promise.resolve();
        }
        return new Promise((resolve, reject) => {
            const transaction = db.transaction(["app_state"], "readwrite");
            const store = transaction.objectStore("app_state");
            const request = store.clear();
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    }

    window.onload = async function() {
        await initDB();
        
        // 旧データ互換処理（localStorageからのサルベージ）
        let oldNotebooks = localStorage.getItem('chronicle_notebooks');
        if (oldNotebooks && isIndexedDBAvailable) {
            try {
                await setDBValue("notebooks", JSON.parse(oldNotebooks));
                await setDBValue("current_nb_id", localStorage.getItem('chronicle_current_nb_id') || 'nb_default');
                await setDBValue("edit_history", JSON.parse(localStorage.getItem('chronicle_edit_history') || '[]'));
                localStorage.removeItem('chronicle_notebooks');
                localStorage.removeItem('chronicle_current_nb_id');
                localStorage.removeItem('chronicle_edit_history');
            } catch(err){ console.error("データ移行失敗", err); }
        }

        notebooks = await getDBValue("notebooks", [
            { id: 'nb_default', name: '日記1', theme: 'theme-classic', isVertical: false, entries: [] }
        ]);
        currentNotebookId = await getDBValue("current_nb_id", 'nb_default');
        editHistory = await getDBValue("edit_history", []);

        if (!notebooks.find(nb => nb.id === currentNotebookId)) {
            currentNotebookId = notebooks[0].id;
        }

        // データの整合性チェックと自動補完
        notebooks.forEach(nb => {
            if (!nb.theme) nb.theme = 'theme-classic';
            if (nb.isVertical === undefined) nb.isVertical = false;
            nb.entries.forEach(entry => {
                if (!entry.images) entry.images = [];
                if (entry.weather === undefined) entry.weather = "";
            });
        });

        const nb = getCurrentNotebook();
        updateLabels(nb ? nb.isVertical : false);

        renderTabs();
        updateNotebookHeader();
        refreshSidebar();
        renderHistory();
        
        const currentEntries = getCurrentEntries();
        if (currentEntries.length > 0) {
            viewDiary(currentEntries[0].id);
        } else {
            showNewForm();
        }
    };

            entryDate: entryDate, entryTitle: entryTitle, timestamp: new Date().getTime()
        });
        if (editHistory.length > 5) editHistory = editHistory.slice(0, 5);

    function addNotebook() {
        const name = prompt("新しい日記の名前を入力してください:", `日記${notebooks.length + 1}`);
        if (!name || name.trim() === "") return;
        const newId = 'nb_' + Date.now();
        notebooks.push({ id: newId, name: name.trim(), theme: 'theme-classic', isVertical: false, entries: [] });

        saveAllData();

    function manageNotebookPrompt(id) {
        const nb = notebooks.find(n => n.id === id);
        if (!nb) return;
        const action = prompt(`【${nb.name}】の管理\n\n1: 名前を変更する\n2: この日記帳を丸ごと削除する\n\n番号を入力してください:`, "1");
        if (action === "1") {
            const newName = prompt("新しい日記の名前を入力してください:", nb.name);
            if (newName && newName.trim() !== "") {
                nb.name = newName.trim();
                saveAllData(); renderTabs(); updateNotebookHeader(); renderHistory();
            }
        } else if (action === "2") {
            if (notebooks.length <= 1) { alert("これ以上日記帳を削除することはできません。"); return; }
            if (confirm(`本当に「${nb.name}」を削除しますか？`)) {
                notebooks = notebooks.filter(n => n.id !== id);
                if (currentNotebookId === id) currentNotebookId = notebooks[0].id;
                editHistory = editHistory.filter(h => h.notebookId !== id);
                saveAllData(); switchNotebook(currentNotebookId);
            }
        }
    }

    function formatJapaneseDate(dateStr) {
        if (!dateStr) return "";
        const parts = dateStr.split('-');
        if (parts.length === 3) {
            const dateObj = new Date(parts[0], parts[1] - 1, parts[2]);
            const formatter = new Intl.DateTimeFormat('ja-JP-u-ca-japanese', { year: 'numeric' });
            return `${formatter.format(dateObj)} ${parts[0]}/${parts[1]}/${parts[2]}`;
        }
        return dateStr;
    }

    function formatSlashDate(dateStr) {
        return dateStr ? dateStr.replace(/-/g, '/') : "";
    }

    function formatBytes(base64String) {
        if (!base64String) return "";
        const padding = (base64String.match(/=/g) || []).length;
        const sizeInBytes = (base64String.length * 3 / 4) - padding;
        if (sizeInBytes < 1024) return sizeInBytes + " B";
        else if (sizeInBytes < 1048576) return (sizeInBytes / 1024).toFixed(1) + " KB";
        else return (sizeInBytes / 1048576).toFixed(1) + " MB";
    }

    function refreshSidebar() {
        const indexList = document.getElementById('indexList');
        indexList.innerHTML = '';
        const currentEntries = getCurrentEntries();
        if (currentEntries.length === 0) {
            indexList.innerHTML = `<li style="color:var(--text-muted);font-size:0.9rem;font-weight:600;padding:10px 0;text-align:center;">${labels['text-no-entries']}</li>`;
            return;
        }
        currentEntries.forEach((entry, idx) => {
            const li = document.createElement('li');
            li.className = `index-item ${entry.id === currentSelectId ? 'active' : ''}`;
            li.innerHTML = `
                <div class="index-row-top"><span class="index-page-num">P.${currentEntries.length - idx}</span><span>${formatSlashDate(entry.date)}</span></div>
                <div class="index-row-bottom ${!entry.title ? 'empty-title' : ''}" title="${entry.title || labels['text-empty-title']}">${entry.title || labels['text-empty-title']}</div>
            `;
            li.onclick = () => viewDiary(entry.id);
            indexList.appendChild(li);
        });
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';
        const dateObj = new Date(calendarYear, calendarMonth, 1);
        document.getElementById('calendarEra').innerText = new Intl.DateTimeFormat('ja-JP-u-ca-japanese', { year: 'numeric' }).format(dateObj);
        document.getElementById('calendarWestern').innerText = `${calendarYear}.${String(calendarMonth + 1).padStart(2, '0')}`;

        ['日', '月', '火', '水', '木', '金', '土'].forEach(d => {
            const label = document.createElement('div'); label.className = 'calendar-day-label'; label.innerText = d; grid.appendChild(label);
        });

        const firstDayIdx = new Date(calendarYear, calendarMonth, 1).getDay();
        const lastDate = new Date(calendarYear, calendarMonth + 1, 0).getDate();
        const prevLastDate = new Date(calendarYear, calendarMonth, 0).getDate();

        for (let i = firstDayIdx - 1; i >= 0; i--) {
            const cell = document.createElement('div'); cell.className = 'calendar-cell'; cell.innerText = prevLastDate - i; grid.appendChild(cell);
        }

        let activeDateString = currentFormDate || "";
        const currentEntries = getCurrentEntries();
        if (currentSelectId) {
            const activeEntry = currentEntries.find(e => e.id === currentSelectId);
            if (activeEntry) activeDateString = activeEntry.date;
        }

        for (let date = 1; date <= lastDate; date++) {
            const cell = document.createElement('div');
            cell.className = 'calendar-cell current-month';
            cell.innerText = date;
            const dateStr = `${calendarYear}-${String(calendarMonth + 1).padStart(2, '0')}-${String(date).padStart(2, '0')}`;
            
            const foundEntry = currentEntries.find(e => e.date === dateStr);
            if (foundEntry) cell.classList.add('has-diary');
            if (dateStr === activeDateString) cell.classList.add('is-active');

            cell.onclick = () => { if (foundEntry) viewDiary(foundEntry.id); else showNewForm(dateStr); };
            grid.appendChild(cell);
        }

        const totalCells = firstDayIdx + lastDate;
        const nextMonthCells = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
        for (let i = 1; i <= nextMonthCells; i++) {
            const cell = document.createElement('div'); cell.className = 'calendar-cell'; cell.innerText = i; grid.appendChild(cell);
        }
    }

    function moveCalendar(direction) {
        calendarMonth += direction;
        if (calendarMonth > 11) { calendarMonth = 0; calendarYear++; }
        if (calendarMonth < 0) { calendarMonth = 11; calendarYear--; }
        renderCalendar();
    }

    function jumpToToday() {
        const today = new Date(); calendarYear = today.getFullYear(); calendarMonth = today.getMonth();
        const dateStr = `${calendarYear}-${String(calendarMonth + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
        const found = getCurrentEntries().find(e => e.date === dateStr);
        if (found) viewDiary(found.id); else showNewForm(dateStr);
    }

    function generateWeatherTemplate(currentWeather = "", textInputId = "diaryWeatherCustom", selectId = "diaryWeatherSelect") {
        const presets = ["", "☀️", "☁️", "☔", "☃️", "🌤️", "⛈️", "🌀", "🌫️ ", "🌡️", "🍃"];
        const isPreset = presets.includes(currentWeather);
        let selectHtml = `<select id="${selectId}" onchange="handleWeatherSelection(this, '${textInputId}')">`;
        presets.forEach(p => { selectHtml += `<option value="${p}" ${isPreset && currentWeather === p ? "selected" : ""}>${p === "" ? "   " : p}</option>`; });
        selectHtml += `<option value="__custom__" ${!isPreset && currentWeather !== "" ? "selected" : ""}>${labels['text-custom-weather']}</option></select>`;
        return `<div class="weather-input-container">${selectHtml}<input type="text" id="${textInputId}" value="${currentWeather}" placeholder="${labels['text-weather-placeholder']}" style="${!isPreset && currentWeather !== "" ? "display:block;" : "display:none;"}"></div>`;
    }

                    <span class="editable-label">${labels['lbl-image']}</span>
                    <div class="image-preview-area" onclick="document.getElementById('diaryImage').click()"><span>${labels['text-click-image']}</span></div>
                    <input type="file" id="diaryImage" accept="image/*" multiple style="display: none;" onchange="handleFileSelectMulti()">
                    <div class="form-images-grid" id="formImagesGrid"></div>
                </div>
                <div class="form-group"><span class="editable-label">${labels['lbl-content']}</span><textarea id="diaryContent" required>${entry.content}</textarea></div>
                <div class="action-buttons" style="border:none; padding:0; margin:0;">
                    <button type="submit">${labels['btn-save-edit']}</button>
                    <button type="button" class="delete-btn" style="padding:12px 20px;" onclick="viewDiary(${id})">${labels['btn-cancel']}</button>
                </div>
            </form>
        `;
        renderFormImagesGrid();
    }

    function onFormDateChange(val) { currentFormDate = val; syncCalendarMonth(val); }
    function handleFileSelectMulti() {
        const files = document.getElementById('diaryImage').files; if (!files || files.length === 0) return;
        let loaded = 0;
        Array.from(files).forEach(file => {
            const reader = new FileReader();
            reader.onloadend = function() {
                tempImagesArray.push({ id: Date.now() + Math.random(), data: reader.result });
                if (++loaded === files.length) { renderFormImagesGrid(); document.getElementById('diaryImage').value = ""; }
            };
            reader.readAsDataURL(file);
        });
    }

    function renderFormImagesGrid() {
        const grid = document.getElementById('formImagesGrid'); if (!grid) return; grid.innerHTML = '';
        tempImagesArray.forEach(img => {
            const div = document.createElement('div'); div.className = 'form-image-item';
            div.innerHTML = `<img src="${img.data}"><span class="file-size-badge">${formatBytes(img.data)}</span><button type="button" class="delete-btn" style="margin-top:5px; padding:4px; font-size:0.75rem; width:100%;" onclick="removeFormImage(${img.id})">Remove</button>`;
            grid.appendChild(div);
        });
    }

    function removeFormImage(id) { tempImagesArray = tempImagesArray.filter(img => img.id !== id); renderFormImagesGrid(); }

    function saveNewDiary(e) {
        e.preventDefault(); const nb = getCurrentNotebook(); if (!nb) return;
        const entry = { id: Date.now(), date: document.getElementById('diaryDate').value, title: document.getElementById('diaryTitle').value.trim(), weather: document.getElementById('diaryWeatherCustom').value.trim(), images: tempImagesArray, content: document.getElementById('diaryContent').value };
        nb.entries.unshift(entry); nb.entries.sort((a,b) => new Date(b.date) - new Date(a.date));
        pushToHistory(nb.id, nb.name, entry.id, entry.date, entry.title); viewDiary(entry.id);
    }

    function saveEditDiary(e, id) {
        e.preventDefault(); const nb = getCurrentNotebook();
        const entry = nb.entries.find(e => e.id === id); if (!entry) return;
        entry.date = document.getElementById('diaryDate').value; entry.title = document.getElementById('diaryTitle').value.trim(); entry.weather = document.getElementById('diaryWeatherCustom').value.trim(); entry.content = document.getElementById('diaryContent').value; entry.images = tempImagesArray;
        nb.entries.sort((a,b) => new Date(b.date) - new Date(a.date));
        pushToHistory(nb.id, nb.name, entry.id, entry.date, entry.title); viewDiary(id);
    }

    function deleteEntry(id) {
        if (confirm('削除してもよろしいですか？')) {
            const nb = getCurrentNotebook();
            nb.entries = nb.entries.filter(e => e.id !== id);
            editHistory = editHistory.filter(h => !(h.notebookId === currentNotebookId && h.entryId === id));
            saveAllData(); renderHistory();
            if (nb.entries.length > 0) viewDiary(nb.entries[0].id); else showNewForm();
        }
    }

    function exportData() {
        const blob = new Blob([JSON.stringify({ version: "3.0", notebooks: notebooks, editHistory: editHistory }, null, 2)], { type: "application/json" });
        const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `chronicle_db_backup_${new Date().toISOString().substring(0, 10)}.json`;
        a.click();
    }

    async function importData(input) {
        const file = input.files[0]; if (!file) return;
        if (!confirm("データを読み込みますか？現在のデータは上書き・消去されます。")) { input.value = ""; return; }

        const reader = new FileReader();
        reader.onload = async function(e) {
            try {
                const parsed = JSON.parse(e.target.result);
                let loadedNotebooks = [];
                let loadedHistory = [];

                if (parsed.notebooks) {
                    loadedNotebooks = parsed.notebooks;
                    loadedHistory = parsed.editHistory || [];
                } else if (parsed.DIARY || parsed.日誌) {
                    if (parsed.DIARY) {
                        loadedNotebooks.push({
                            id: "nb_diary_sample", name: "DIARY", theme: "theme-classic", isVertical: false,
                            entries: parsed.DIARY.map((x, i) => ({ id: Date.now() + i, date: x.date, title: x.title, weather: "", images: [], content: x.content }))
                        });
                    }
                    if (parsed.日誌) {
                        loadedNotebooks.push({
                            id: "nb_nishi_sample", name: "日誌", theme: "theme-purple", isVertical: true,
                            entries: parsed.日誌.map((x, i) => ({ id: Date.now() + 10 + i, date: x.date, title: x.title, weather: "", images: [], content: x.content }))
                        });
                    }
                } else {
                    alert("非対応のファイル構造です。"); return;
                }

                await clearDB();
                notebooks = loadedNotebooks;
                currentNotebookId = notebooks[0].id;
                editHistory = loadedHistory;

                await saveAllData();
                updateLabels(getCurrentNotebook()?.isVertical);
                renderTabs(); updateNotebookHeader(); refreshSidebar(); renderHistory();
                if (getCurrentEntries().length > 0) viewDiary(getCurrentEntries()[0].id); else showNewForm();
                
                alert("✅ データのインポートが完了しました！");
            } catch (err) {
                alert("インポート失敗: " + err.message);
            }
            input.value = "";
        };
        reader.readAsText(file);
    }
</script>
</body>
</html>
