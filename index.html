<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronicle - 多機能絵日記帳</title>
    <style>
        :root {
            --panel-bg: #ffffff;          /* 基本のパネル背景 */
            --text-main: #1a252f;         /* より濃くハッキリしたチャコール */
            --text-muted: #555555;        /* 薄すぎない、しっかり読めるグレー */
            --border-color: #b0a99f;      /* 枠線を太く・濃くして境界を明瞭に */
            --danger-color: #c0392b;      /* 落ち着いたワインレッド */

            /* 初期値（Classic Gold） */
            --bg-color: #fcfbf9;
            --accent-color: #a0522d;
            --accent-hover: #8b4513;
        }

        /* --- メリハリがあり区別しやすい10種類のエレガントなテーマ定義 --- */
        body.theme-classic { --bg-color: #fcfbf9; --accent-color: #a0522d; --accent-hover: #8b4513; } /* シエナブラウン */
        body.theme-green   { --bg-color: #f2f7f4; --accent-color: #1e5631; --accent-hover: #143d22; } /* フォレストグリーン */
        body.theme-blue    { --bg-color: #f0f5fa; --accent-color: #1a4a75; --accent-hover: #103250; } /* ディープブルー */
        body.theme-red     { --bg-color: #faf2f2; --accent-color: #8b0000; --accent-hover: #5a0000; } /* ダークレッド */
        body.theme-pink    { --bg-color: #fdf5f7; --accent-color: #b33951; --accent-hover: #8c2639; } /* ローズマゼンタ */
        body.theme-purple  { --bg-color: #f6f3f8; --accent-color: #5d317c; --accent-hover: #43205b; } /* ロイヤルパープル */
        body.theme-amber   { --bg-color: #fcf7f2; --accent-color: #c25c0e; --accent-hover: #964303; } /* ディープアンバー */
        body.theme-teal    { --bg-color: #f0f7f7; --accent-color: #006666; --accent-hover: #004d4d; } /* ディープティール */
        body.theme-gray    { --bg-color: #f5f6f6; --accent-color: #4a5568; --accent-hover: #2d3748; } /* スレートグレー */
        body.theme-dark    { --bg-color: #eef0f1; --accent-color: #2c3e50; --accent-hover: #1a252f; } /* ミッドナイトブラック */

        body {
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", "Hiragino Kaku Gothic ProN", "BIZ UDPGothic", "Meiryo", sans-serif;
            color: var(--text-main);
            font-weight: 500;
            margin: 0;
            padding: 20px 10px 40px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            letter-spacing: 0.05em;
            transition: background-color 0.4s ease;
        }

        /* ノート切り替えタブ */
        .notebook-tabs-container {
            width: 100%;
            max-width: 1200px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        .notebook-tabs {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 2px;
            background-color: var(--border-color);
            border: 2px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
        }
        .notebook-tab {
            padding: 15px 15px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-muted);
            background-color: var(--panel-bg);
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
            box-sizing: border-box;
            min-width: 0;
        }
        .notebook-tab:hover {
            background-color: #f5f3ef;
            color: var(--text-main);
        }
        .notebook-tab.active {
            background-color: #fff;
            color: var(--text-main);
            font-weight: 800;
            box-shadow: inset 0 -4px 0 var(--accent-color);
        }
        .notebook-tab-add {
            background-color: #f5f3ef;
            color: var(--text-main);
            justify-content: center;
        }
        .notebook-tab-add:hover {
            background-color: #e5e2db;
        }
        .notebook-tab-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex-grow: 1;
            margin-right: 5px;
        }
        .notebook-tab-rename-btn {
            font-size: 0.85rem;
            color: var(--accent-color);
            background: none;
            border: none;
            padding: 2px 4px;
            width: auto;
            cursor: pointer;
            flex-shrink: 0;
        }

        /* 現在の日記帳名とテーマ設定エリア */
        .notebook-header-panel {
            width: 100%;
            max-width: 1200px;
            background-color: var(--panel-bg);
            border: 2px solid var(--border-color);
            border-radius: 6px;
            padding: 15px 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .current-notebook-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-main);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .theme-selector-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-main);
        }
        .theme-selector-wrapper select {
            width: auto;
            padding: 8px 12px;
            font-weight: 600;
            border: 2px solid var(--border-color);
        }

        /* 全体コンテナ */
        .container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 992px) {
            .container {
                grid-template-columns: 290px 1fr 290px;
                align-items: start;
            }
            .sidebar-left, .sidebar-right {
                position: sticky;
                top: 20px;
            }
        }

        .notebook-panel {
            background-color: var(--panel-bg);
            border: 2px solid var(--border-color);
            border-radius: 6px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
        }

        .notebook-panel.history-panel {
            margin-top: 20px; /* カレンダーの下に配置するための余白 */
        }

        h2, h3 {
            margin-top: 0;
            color: var(--text-main);
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: 0.1em;
            border-bottom: 3px solid var(--accent-color);
            padding-bottom: 8px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .editable-label {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--accent-color);
            display: inline-block;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .form-group { margin-bottom: 25px; }

        input[type="text"], input[type="date"], select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 4px;
            background-color: #faf9f6;
            box-sizing: border-box;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-main);
            font-family: inherit;
            transition: all 0.3s;
        }
        input[type="text"]:focus, input[type="date"]:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            background-color: #fff;
        }

        textarea { height: 180px; resize: vertical; line-height: 1.8; font-weight: 500; }

        .image-preview-area {
            border: 2px dashed var(--accent-color);
            padding: 20px;
            text-align: center;
            background-color: #faf9f6;
            cursor: pointer;
            font-weight: 600;
        }
        .image-preview-area img {
            max-width: 100%;
            max-height: 250px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 12px 20px;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
            text-transform: uppercase;
        }
        button:hover { background-color: var(--accent-hover); }

        .backup-btn {
            background-color: transparent;
            color: var(--text-main);
            border: 2px solid var(--border-color);
            margin-bottom: 12px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .backup-btn:hover { background-color: #faf9f6; }
        
        .new-post-btn { background-color: var(--text-main); margin-bottom: 25px; font-size: 1rem;}
        .new-post-btn:hover { background-color: #000000; }
        
        .file-input-label {
            display: block;
            background-color: transparent;
            color: var(--text-main);
            border: 2px solid var(--border-color);
            border-radius: 4px;
            padding: 10px 15px;
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
        }
        .file-input-label:hover { background-color: #faf9f6; }

        /* 目次リスト（2行表示用） */
        .index-list, .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .index-list { max-height: 450px; overflow-y: auto; }

        .index-item, .history-item {
            padding: 12px 14px;
            background-color: #faf9f6;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 4px;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }
        .index-item:hover, .index-item.active, .history-item:hover {
            background-color: #ffffff;
            border-color: var(--accent-color);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            transform: translateY(-1px);
        }
        .index-item.active {
            border-left: 6px solid var(--accent-color);
        }
        .index-row-top, .history-row-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
        }
        .index-page-num, .history-notebook-name {
            color: var(--accent-color);
        }
        .index-row-bottom, .history-row-bottom {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-top: 2px;
        }
        .index-row-bottom.empty-title, .history-row-bottom.empty-title {
            color: #b0a99f;
            font-size: 0.85rem;
            font-style: italic;
        }

        /* 閲覧時の日記タイトルスタイル */
        .diary-view-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-main);
            margin: -5px 0 15px 0;
            padding-bottom: 2px;
        }

        .diary-view-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-main);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
        }
        .diary-view-image {
            text-align: center;
            margin-bottom: 30px;
            background-color: #faf9f6;
            padding: 15px;
            border: 2px solid var(--border-color);
        }
        .diary-view-image img {
            max-width: 100%;
            max-height: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        .diary-view-text {
            font-size: 1.05rem;
            font-weight: 500;
            line-height: 2;
            white-space: pre-wrap;
            color: var(--text-main);
            min-height: 150px;
        }
        
        .action-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 40px;
            border-top: 2px solid var(--border-color);
            padding-top: 20px;
        }
        .delete-btn { background-color: transparent; color: var(--text-muted); border: 2px solid var(--border-color); padding: 8px 16px; font-size: 0.85rem; font-weight: 600; width: auto; }
        .delete-btn:hover { background-color: #fff1f0; color: var(--danger-color); border-color: var(--danger-color); }
        .edit-entry-btn { background-color: transparent; color: var(--accent-color); border: 2px solid var(--accent-color); padding: 8px 16px; font-size: 0.85rem; font-weight: 700; width: auto; }
        .edit-entry-btn:hover { background-color: var(--accent-color); color: white; }

        /* カレンダー */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .calendar-title { font-size: 1.05rem; font-weight: 700; letter-spacing: 0.05em; }
        .calendar-nav-btn {
            background: none;
            color: var(--text-main);
            border: 2px solid var(--border-color);
            border-radius: 4px;
            padding: 4px 12px;
            width: auto;
            font-size: 0.85rem;
            font-weight: 700;
        }
        .calendar-nav-btn:hover { background-color: #faf9f6; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
        .calendar-day-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-main);
            padding-bottom: 8px;
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 4px;
        }
        .calendar-cell {
            font-size: 0.85rem;
            font-weight: 600;
            padding: 8px 0;
            color: #b0b0b0;
        }
        .calendar-cell.current-month {
            color: var(--text-main);
            cursor: pointer;
            border: 2px solid transparent;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .calendar-cell.current-month:hover {
            background-color: #eae6db;
        }
        .calendar-cell.has-diary {
            background-color: #ffffff;
            color: var(--accent-color);
            font-weight: 800;
            border: 2px solid var(--accent-color);
        }
        .calendar-cell.has-diary:hover {
            background-color: var(--accent-color);
            color: white;
        }
        .calendar-cell.is-active {
            background-color: var(--text-main) !important;
            color: white !important;
            border-color: var(--text-main) !important;
        }
    </style>
</head>
<body class="theme-classic" id="appBody">

<!-- 最上部：日記切り替えメニュー（タブ型） -->
<div class="notebook-tabs-container">
    <div class="notebook-tabs" id="notebookTabs"></div>
</div>

<!-- 選択中の日記帳名とテーマ一括変更用パネル -->
<div class="notebook-header-panel">
    <h1 class="current-notebook-title" id="currentNotebookTitle">📖 DIARY</h1>
    <div class="theme-selector-wrapper">
        <span>COLOR THEME</span>
        <select id="notebookGlobalTheme" onchange="changeNotebookTheme(this.value)">
            <option value="theme-classic">1. Sienna Brown</option>
            <option value="theme-green">2. Forest Green</option>
            <option value="theme-blue">3. Deep Blue</option>
            <option value="theme-red">4. Dark Red</option>
            <option value="theme-pink">5. Rose Magenta</option>
            <option value="theme-purple">6. Royal Purple</option>
            <option value="theme-amber">7. Deep Amber</option>
            <option value="theme-teal">8. Deep Teal</option>
            <option value="theme-gray">9. Slate Gray</option>
            <option value="theme-dark">10. Midnight Black</option>
        </select>
    </div>
</div>

<div class="container">
    <!-- 左側：サイドバー（目次・管理） -->
    <div class="sidebar-left">
        <div class="notebook-panel">
            <button class="new-post-btn" onclick="showNewForm()">Write a Diary</button>
            <h3>Index</h3>
            <ul class="index-list" id="indexList" style="margin-bottom: 30px;"></ul>
            <h3>Management</h3>
            <div>
                <button class="backup-btn" onclick="exportData()">Export (Backup)</button>
                <label class="file-input-label">
                    Import (Restore)
                    <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importData(this)">
                </label>
            </div>
        </div>
    </div>

    <!-- 中央：メインコンテンツ -->
    <div class="notebook-panel" id="mainPanel"></div>

    <!-- 右側：サイドバー（カレンダー ＋ 横断的な編集履歴） -->
    <div class="sidebar-right">
        <!-- カレンダー -->
        <div class="notebook-panel">
            <h3>Calendar</h3>
            <div class="calendar-header">
                <button class="calendar-nav-btn" onclick="moveCalendar(-1)">◀</button>
                <div class="calendar-title" id="calendarTitle">2026.07</div>
                <button class="calendar-nav-btn" onclick="moveCalendar(1)">▶</button>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>

        <!-- 追加：横断的な最近の編集履歴 -->
        <div class="notebook-panel history-panel">
            <h3>Recent Activity</h3>
            <ul class="history-list" id="historyList"></ul>
        </div>
    </div>
</div>

<script>
    let notebooks = JSON.parse(localStorage.getItem('chronicle_notebooks')) || [
        { id: 'nb_default', name: '日記1', theme: 'theme-classic', entries: [] }
    ];
    let currentNotebookId = localStorage.getItem('chronicle_current_nb_id') || 'nb_default';

    // 横断編集履歴を保持するためのグローバル配列（最大5件）
    let editHistory = JSON.parse(localStorage.getItem('chronicle_edit_history')) || [];

    const labels = {
        'lbl-date': 'Date',
        'lbl-title': 'Title (Optional)',
        'lbl-weather': 'Weather',
        'lbl-image': 'Photograph',
        'lbl-content': 'Chronicle'
    };
    
    let currentSelectId = null;
    let currentFormDate = null;
    let tempImageData = "";

    let calendarYear = new Date().getFullYear();
    let calendarMonth = new Date().getMonth();

    window.onload = function() {
        if (!notebooks.find(nb => nb.id === currentNotebookId)) {
            currentNotebookId = notebooks[0].id;
        }
        notebooks.forEach(nb => { if (!nb.theme) nb.theme = 'theme-classic'; });

        renderTabs();
        updateNotebookHeader();
        refreshSidebar();
        renderHistory(); // 履歴の描画
        
        const currentEntries = getCurrentEntries();
        if (currentEntries.length > 0) {
            viewDiary(currentEntries[0].id);
        } else {
            showNewForm();
        }
    };

    function getCurrentNotebook() {
        return notebooks.find(n => n.id === currentNotebookId);
    }

    function getCurrentEntries() {
        const nb = getCurrentNotebook();
        return nb ? nb.entries : [];
    }

    function saveAllData() {
        localStorage.setItem('chronicle_notebooks', JSON.stringify(notebooks));
        localStorage.setItem('chronicle_current_nb_id', currentNotebookId);
        localStorage.setItem('chronicle_edit_history', JSON.stringify(editHistory));
    }

    // 横断編集履歴に新しいログを追加・保存する関数
    function pushToHistory(notebookId, notebookName, entryId, entryDate, entryTitle) {
        // 同じ日記ページの既存ログがあれば重複排除
        editHistory = editHistory.filter(h => !(h.notebookId === notebookId && h.entryId === entryId));
        
        // 先頭に追加
        editHistory.unshift({
            notebookId: notebookId,
            notebookName: notebookName,
            entryId: entryId,
            entryDate: entryDate,
            entryTitle: entryTitle,
            timestamp: new Date().getTime()
        });

        // 最大5件に絞る
        if (editHistory.length > 5) {
            editHistory = editHistory.slice(0, 5);
        }
        
        saveAllData();
        renderHistory();
    }

    // 履歴セクションを描画する関数
    function renderHistory() {
        const historyList = document.getElementById('historyList');
        historyList.innerHTML = '';

        if (editHistory.length === 0) {
            historyList.innerHTML = '<li style="color:var(--text-muted);font-size:0.85rem;font-weight:600;padding:10px 0;text-align:center;">No recent activity.</li>';
            return;
        }

        editHistory.forEach(h => {
            // 現在の全データから対象ノートおよび日記が実在するか確認（削除対策）
            const nbExist = notebooks.find(n => n.id === h.notebookId);
            if (!nbExist) return;
            const entryExist = nbExist.entries.find(e => e.id === h.entryId);
            if (!entryExist) return;

            const li = document.createElement('li');
            li.className = 'history-item';
            
            const slashDate = formatSlashDate(h.entryDate);
            const topRow = `<div class="history-row-top"><span class="history-notebook-name">📔 ${h.notebookName}</span><span>${slashDate}</span></div>`;
            
            let bottomRow = '';
            if (h.entryTitle) {
                bottomRow = `<div class="history-row-bottom">${h.entryTitle}</div>`;
            } else {
                bottomRow = `<div class="history-row-bottom empty-title">(タイトルなし)</div>`;
            }

            li.innerHTML = topRow + bottomRow;
            // クリック時、ノートを跨いで対象の日記を表示するリンク機能
            li.onclick = () => jumpToDiary(h.notebookId, h.entryId);
            historyList.appendChild(li);
        });
    }

    // 履歴から別の日記帳（ノート）の特定のページへジャンプする処理
    function jumpToDiary(notebookId, entryId) {
        currentNotebookId = notebookId;
        currentSelectId = entryId;
        currentFormDate = null;
        
        saveAllData();
        renderTabs();
        updateNotebookHeader();
        refreshSidebar();
        viewDiary(entryId);
    }

    function applyTheme(themeName) {
        const body = document.getElementById('appBody');
        body.className = '';
        body.classList.add(themeName || 'theme-classic');
    }

    function updateNotebookHeader() {
        const nb = getCurrentNotebook();
        if (nb) {
            document.getElementById('currentNotebookTitle').innerText = `📖 ${nb.name}`;
            document.getElementById('notebookGlobalTheme').value = nb.theme || 'theme-classic';
            applyTheme(nb.theme);
        }
    }

    function changeNotebookTheme(themeName) {
        const nb = getCurrentNotebook();
        if (nb) {
            nb.theme = themeName;
            saveAllData();
            applyTheme(themeName);
            renderTabs();
            refreshSidebar();
            renderCalendar();
        }
    }

    function renderTabs() {
        const container = document.getElementById('notebookTabs');
        container.innerHTML = '';

        notebooks.forEach(nb => {
            const btn = document.createElement('button');
            btn.className = `notebook-tab ${nb.id === currentNotebookId ? 'active' : ''}`;
            
            const textSpan = document.createElement('span');
            textSpan.className = 'notebook-tab-text';
            textSpan.innerText = nb.name;
            textSpan.title = nb.name;
            textSpan.onclick = () => switchNotebook(nb.id);
            btn.appendChild(textSpan);

            const renameBtn = document.createElement('span');
            renameBtn.className = 'notebook-tab-rename-btn';
            renameBtn.innerHTML = '📔';
            renameBtn.onclick = (e) => {
                e.stopPropagation();
                manageNotebookPrompt(nb.id);
            };
            btn.appendChild(renameBtn);

            container.appendChild(btn);
        });

        const addBtn = document.createElement('button');
        addBtn.className = 'notebook-tab notebook-tab-add';
        addBtn.innerText = '＋ 日記を追加';
        addBtn.onclick = addNotebook;
        container.appendChild(addBtn);
    }

    function switchNotebook(id) {
        currentNotebookId = id;
        currentSelectId = null;
        currentFormDate = null;
        saveAllData();
        renderTabs();
        updateNotebookHeader();
        refreshSidebar();
        
        const currentEntries = getCurrentEntries();
        if (currentEntries.length > 0) {
            viewDiary(currentEntries[0].id);
        } else {
            showNewForm();
        }
    }

    function addNotebook() {
        const name = prompt("新しい日記（ノート）の名前を入力してください:", `日記${notebooks.length + 1}`);
        if (!name || name.trim() === "") return;

        const newId = 'nb_' + Date.now();
        notebooks.push({ id: newId, name: name.trim(), theme: 'theme-classic', entries: [] });
        currentNotebookId = newId;
        saveAllData();
        switchNotebook(newId);
    }

    function manageNotebookPrompt(id) {
        const nb = notebooks.find(n => n.id === id);
        if (!nb) return;

        const action = prompt(`【${nb.name}】の管理\n\n1: 名前を変更する\n2: この日記帳を丸ごと削除する\n\n番号を入力してください:`, "1");
        
        if (action === "1") {
            const newName = prompt("新しい日記の名前を入力してください:", nb.name);
            if (newName && newName.trim() !== "") {
                nb.name = newName.trim();
                saveAllData();
                renderTabs();
                updateNotebookHeader();
                renderHistory(); // 履歴側の表記も更新するため再描画
            }
        } else if (action === "2") {
            if (notebooks.length <= 1) {
                alert("これ以上日記帳を削除することはできません。");
                return;
            }
            if (confirm(`本当に「${nb.name}」を中の日記データも含めてすべて削除しますか？`)) {
                notebooks = notebooks.filter(n => n.id !== id);
                if (currentNotebookId === id) currentNotebookId = notebooks[0].id;
                // 履歴からも削除されたノートのデータを消す
                editHistory = editHistory.filter(h => h.notebookId !== id);
                saveAllData();
                switchNotebook(currentNotebookId);
            }
        }
    }

    function formatJapaneseDate(dateStr) {
        if (!dateStr) return "";
        const parts = dateStr.split('-');
        if (parts.length === 3) {
            return `${parts[0]}/${parts[1]}/${parts[2]}/`;
        }
        return dateStr;
    }

    function formatSlashDate(dateStr) {
        if (!dateStr) return "";
        return dateStr.replace(/-/g, '/');
    }

    function refreshSidebar() {
        const indexList = document.getElementById('indexList');
        indexList.innerHTML = '';
        const currentEntries = getCurrentEntries();

        if (currentEntries.length === 0) {
            indexList.innerHTML = '<li style="color:var(--text-muted);font-size:0.9rem;font-weight:600;padding:10px 0;text-align:center;">No entries yet.</li>';
            return;
        }

        currentEntries.forEach((entry, idx) => {
            const pageNum = currentEntries.length - idx;
            const li = document.createElement('li');
            li.className = `index-item ${entry.id === currentSelectId ? 'active' : ''}`;
            
            const slashDate = formatSlashDate(entry.date);
            const topRow = `<div class="index-row-top"><span class="index-page-num">P.${pageNum}</span><span>${slashDate}</span></div>`;
            
            let bottomRow = '';
            if (entry.title) {
                bottomRow = `<div class="index-row-bottom" title="${entry.title}">${entry.title}</div>`;
            } else {
                bottomRow = `<div class="index-row-bottom empty-title">(タイトルなし)</div>`;
            }

            li.innerHTML = topRow + bottomRow;
            li.onclick = () => viewDiary(entry.id);
            indexList.appendChild(li);
        });
    }

    function renderCalendar() {
        const title = document.getElementById('calendarTitle');
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';

        title.innerText = `${calendarYear}.${String(calendarMonth + 1).padStart(2, '0')}`;

        const days = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
        days.forEach(d => {
            const label = document.createElement('div');
            label.className = 'calendar-day-label';
            label.innerText = d;
            grid.appendChild(label);
        });

        const firstDayIdx = new Date(calendarYear, calendarMonth, 1).getDay();
        const lastDate = new Date(calendarYear, calendarMonth + 1, 0).getDate();
        const prevLastDate = new Date(calendarYear, calendarMonth, 0).getDate();

        for (let i = firstDayIdx - 1; i >= 0; i--) {
            const cell = document.createElement('div');
            cell.className = 'calendar-cell';
            cell.innerText = prevLastDate - i;
            grid.appendChild(cell);
        }

        let activeDateString = currentFormDate || "";
        const currentEntries = getCurrentEntries();
        if (currentSelectId) {
            const activeEntry = currentEntries.find(e => e.id === currentSelectId);
            if (activeEntry) activeDateString = activeEntry.date;
        }

        for (let date = 1; date <= lastDate; date++) {
            const cell = document.createElement('div');
            cell.className = 'calendar-cell current-month';
            cell.innerText = date;

            const dateStr = `${calendarYear}-${String(calendarMonth + 1).padStart(2, '0')}-${String(date).padStart(2, '0')}`;
            
            const foundEntry = currentEntries.find(e => e.date === dateStr);
            if (foundEntry) {
                cell.classList.add('has-diary');
            }
            
            cell.onclick = () => onCalendarCellClick(dateStr, foundEntry);

            if (dateStr === activeDateString) {
                cell.classList.add('is-active');
            }

            grid.appendChild(cell);
        }

        const totalCells = firstDayIdx + lastDate;
        const nextMonthCells = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
        for (let i = 1; i <= nextMonthCells; i++) {
            const cell = document.createElement('div');
            cell.className = 'calendar-cell';
            cell.innerText = i;
            grid.appendChild(cell);
        }
    }

    function onCalendarCellClick(dateStr, foundEntry) {
        if (foundEntry) {
            viewDiary(foundEntry.id);
        } else {
            showNewForm(dateStr);
        }
    }

    function moveCalendar(direction) {
        calendarMonth += direction;
        if (calendarMonth > 11) { calendarMonth = 0; calendarYear++; }
        if (calendarMonth < 0) { calendarMonth = 11; calendarYear--; }
        renderCalendar();
    }

    function viewDiary(id) {
        currentSelectId = id;
        currentFormDate = null;
        const currentEntries = getCurrentEntries();
        const entry = currentEntries.find(e => e.id === id);
        const mainPanel = document.getElementById('mainPanel');
        if (!entry) return;

        refreshSidebar();

        const entryDate = new Date(entry.date);
        if (!isNaN(entryDate)) {
            calendarYear = entryDate.getFullYear();
            calendarMonth = entryDate.getMonth();
        }
        renderCalendar();

        const idx = currentEntries.indexOf(entry);
        const pageNum = currentEntries.length - idx;
        const imgHtml = entry.image ? `<div class="diary-view-image"><img src="${entry.image}"></div>` : '';
        const titleHtml = entry.title ? `<div class="diary-view-title">📌 ${entry.title}</div>` : '';

        mainPanel.innerHTML = `
            <h2>Page.${pageNum}</h2>
            ${titleHtml}
            <div class="diary-view-header">
                <div>📅 <strong>${labels['lbl-date']}:</strong> ${formatJapaneseDate(entry.date)}</div>
                <div><strong>${labels['lbl-weather']}:</strong> ${entry.weather}</div>
            </div>
            ${imgHtml}
            <div style="font-size:0.85rem; color:var(--accent-color); margin-bottom:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.1em;">${labels['lbl-content']}</div>
            <div class="diary-view-text">${entry.content}</div>
            
            <div class="action-buttons">
                <button class="edit-entry-btn" onclick="showEditForm(${entry.id})">Edit Entry</button>
                <button class="delete-btn" onclick="deleteEntry(${entry.id})">Delete</button>
            </div>
        `;
    }

    function showNewForm(targetDateStr = null) {
        currentSelectId = null;
        tempImageData = "";

        const finalDateStr = targetDateStr || new Date().toISOString().substring(0, 10);
        currentFormDate = finalDateStr;

        refreshSidebar();
        syncCalendarMonth(finalDateStr);

        const mainPanel = document.getElementById('mainPanel');
        mainPanel.innerHTML = `
            <h2>New Entry</h2>
            <form id="diaryForm" onsubmit="saveNewDiary(event)">
                <div class="form-group">
                    <span class="editable-label">${labels['lbl-date']}</span>
                    <input type="date" id="diaryDate" value="${finalDateStr}" required onchange="onFormDateChange(this.value)">
                </div>
                <div class="form-group">
                    <span class="editable-label">${labels['lbl-title']}</span>
                    <input type="text" id="diaryTitle" placeholder="例: 外出、仕事、旅行など（省略可）">
                </div>
                <div class="form-group">
                    <span class="editable-label">${labels['lbl-weather']}</span>
                    <select id="diaryWeather">
                        <option value="☀️ Fine">☀️ Fine</option>
                        <option value="☁️ Cloudy">☁️ Cloudy</option>
                        <option value="☔ Rainy">☔ Rainy</option>
                        <option value="☃️ Snowy">☃️ Snowy</option>
                    </select>
                </div>
                <div class="form-group">
                    <span class="editable-label">${labels['lbl-image']}</span>
                    <div class="image-preview-area" onclick="document.getElementById('diaryImage').click()">
                        <span id="previewPlaceholder">Click to select an image</span>
                        <img id="imagePreview" src="" style="display: none;">
                    </div>
                    <input type="file" id="diaryImage" accept="image/*" style="display: none;" onchange="handleFileSelect('imagePreview', 'previewPlaceholder')">
                </div>
                <div class="form-group">
                    <span class="editable-label">${labels['lbl-content']}</span>
                    <textarea id="diaryContent" placeholder="Describe your day..." required></textarea>
                </div>
                <button type="submit">Save to Chronicle</button>
            </form>
        `;
    }

    function onFormDateChange(val) {
        currentFormDate = val;
        syncCalendarMonth(val);
    }

    function syncCalendarMonth(dateValue) {
        const d = new Date(dateValue);
        if(!isNaN(d)) {
            calendarYear = d.getFullYear();
            calendarMonth = d.getMonth();
            renderCalendar();
        }
    }

    function showEditForm(id) {
        const currentEntries = getCurrentEntries();
        const entry = currentEntries.find(e => e.id === id);
        if (!entry) return;

        tempImageData = entry.image;
        currentFormDate = entry.date;
        const mainPanel = document.getElementById('mainPanel');
        
        mainPanel.innerHTML = `
            <h2>Edit Page.${currentEntries.length - currentEntries.indexOf(entry)}</h2>
            <form id="diaryForm" onsubmit="saveEditDiary(event, ${id})">
                <div class="form-group">
                    <span class="editable-label">${labels['lbl-date']}</span>
                    <input type="date" id="diaryDate" value="${entry.date}" required onchange="onFormDateChange(this.value)">
                </div>
                <div class="form-group">
                    <span class="editable-label">${labels['lbl-title']}</span>
                    <input type="text" id="diaryTitle" value="${entry.title || ''}" placeholder="例: 外出、仕事、旅行など（省略可）">
                </div>
                <div class="form-group">
                    <span class="editable-label">${labels['lbl-weather']}</span>
                    <select id="diaryWeather">
                        <option value="☀️ Fine" ${entry.weather.includes('Fine')?'selected':''}>☀️ Fine</option>
                        <option value="☁️ Cloudy" ${entry.weather.includes('Cloudy')?'selected':''}>☁️ Cloudy</option>
                        <option value="☔ Rainy" ${entry.weather.includes('Rainy')?'selected':''}>☔ Rainy</option>
                        <option value="☃️ Snowy" ${entry.weather.includes('Snowy')?'selected':''}>☃️ Snowy</option>
                    </select>
                </div>
                <div class="form-group">
                    <span class="editable-label">${labels['lbl-image']}</span>
                    <div class="image-preview-area" onclick="document.getElementById('diaryImage').click()">
                        <span id="previewPlaceholder" style="${entry.image?'display:none;':''}">Click to select an image</span>
                        <img id="imagePreview" src="${entry.image || ''}" style="${entry.image?'display:block;':'display:none;'}">
                    </div>
                    <input type="file" id="diaryImage" accept="image/*" style="display: none;" onchange="handleFileSelect('imagePreview', 'previewPlaceholder')">
                    <div style="margin-top:10px;">
                        <button type="button" class="delete-btn" style="padding:6px 12px;" onclick="removeImage()">Remove Photograph</button>
                    </div>
                </div>
                <div class="form-group">
                    <span class="editable-label">${labels['lbl-content']}</span>
                    <textarea id="diaryContent" required>${entry.content}</textarea>
                </div>
                <div class="action-buttons" style="border:none; padding:0; margin:0;">
                    <button type="submit">Save Changes</button>
                    <button type="button" class="delete-btn" style="padding:12px 20px; border-radius:2px;" onclick="viewDiary(${id})">Cancel</button>
                </div>
            </form>
        `;
        renderCalendar();
    }

    function handleFileSelect(imgId, placeholderId) {
        const file = document.getElementById('diaryImage').files[0];
        const reader = new FileReader();
        reader.onloadend = function () {
            document.getElementById(imgId).src = reader.result;
            document.getElementById(imgId).style.display = 'block';
            document.getElementById(placeholderId).style.display = 'none';
            tempImageData = reader.result;
        }
        if (file) reader.readAsDataURL(file);
    }

    function removeImage() {
        tempImageData = "";
        document.getElementById('imagePreview').style.display = 'none';
        document.getElementById('previewPlaceholder').style.display = 'block';
    }

    function saveNewDiary(e) {
        e.preventDefault();
        const nb = getCurrentNotebook();
        if (!nb) return;

        const newEntry = {
            id: Date.now(),
            date: document.getElementById('diaryDate').value,
            title: document.getElementById('diaryTitle').value.trim(),
            weather: document.getElementById('diaryWeather').value,
            image: tempImageData,
            content: document.getElementById('diaryContent').value
        };
        
        nb.entries.unshift(newEntry);
        nb.entries.sort((a,b) => new Date(b.date) - new Date(a.date));
        
        // 履歴にプッシュ
        pushToHistory(nb.id, nb.name, newEntry.id, newEntry.date, newEntry.title);
        
        saveAllData();
        viewDiary(newEntry.id);
    }

    function saveEditDiary(e, id) {
        e.preventDefault();
        const nb = getCurrentNotebook();
        if (!nb) return;

        const entry = nb.entries.find(e => e.id === id);
        if (!entry) return;

        entry.date = document.getElementById('diaryDate').value;
        entry.title = document.getElementById('diaryTitle').value.trim();
        entry.weather = document.getElementById('diaryWeather').value;
        entry.content = document.getElementById('diaryContent').value;
        entry.image = tempImageData;

        nb.entries.sort((a,b) => new Date(b.date) - new Date(a.date));
        
        // 履歴にプッシュ（更新）
        pushToHistory(nb.id, nb.name, entry.id, entry.date, entry.title);

        saveAllData();
        viewDiary(id);
    }

    function deleteEntry(id) {
        if (confirm('Are you sure you want to delete this entry?')) {
            const nb = notebooks.find(n => n.id === currentNotebookId);
            if (nb) {
                nb.entries = nb.entries.filter(entry => entry.id !== id);
                // 履歴からも削除
                editHistory = editHistory.filter(h => !(h.notebookId === currentNotebookId && h.entryId === id));
                saveAllData();
                renderHistory();

                const currentEntries = getCurrentEntries();
                if (currentEntries.length > 0) {
                    viewDiary(currentEntries[0].id);
                } else {
                    showNewForm();
                }
            }
        }
    }

    function exportData() {
        if (notebooks.length === 0) { alert("No data to export."); return; }
        const backupData = { version: "2.0", notebooks: notebooks, editHistory: editHistory };
        const blob = new Blob([JSON.stringify(backupData, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `chronicle_multi_backup_${new Date().toISOString().substring(0, 10)}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function importData(input) {
        const file = input.files[0];
        if (!file) return;
        if (!confirm("データをインポートしますか？")) { input.value = ""; return; }
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const importedData = JSON.parse(e.target.result);
                if (importedData.notebooks) {
                    notebooks = importedData.notebooks;
                    currentNotebookId = notebooks[0].id;
                    editHistory = importedData.editHistory || [];
                } else if (importedData.entries) {
                    notebooks = [{ id: 'nb_default', name: '復元された日記', theme: 'theme-classic', entries: importedData.entries }];
                    currentNotebookId = 'nb_default';
                    editHistory = [];
                } else {
                    alert("無効なファイル形式です。");
                    return;
                }
                notebooks.forEach(nb => { if (!nb.theme) nb.theme = 'theme-classic'; });
                saveAllData();
                renderTabs();
                updateNotebookHeader();
                refreshSidebar();
                renderHistory();
                const currentEntries = getCurrentEntries();
                if (currentEntries.length > 0) viewDiary(currentEntries[0].id);
                else showNewForm();
                alert("データをインポートしました。");
            } catch (err) {
                alert("エラーが発生しました。");
            }
            input.value = "";
        };
        reader.readAsText(file);
    }
</script>
</body>
</html>
